<!DOCTYPE html>
<html lang="en">
<head>
    <title>TC App - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="mdl-layout mdl-layout--fixed-header">
        <header class="mdl-layout__header"><div class="mdl-layout__header-row"><span class="mdl-layout-title">TC App</span></div></header>
        <main class="mdl-layout__content">
            <div class="page-content">
                <div class="card">
                    <h2>Login</h2>
                    <form onsubmit="handleLogin(event)">
                        <input type="text" id="user" class="tc-input" placeholder="Username (User123)" required>
                        <input type="password" id="pass" class="tc-input" placeholder="Password (User123)" required>
                        <button type="submit" class="mdl-button mdl-js-button mdl-button--raised tc-btn-blue">LOGIN</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            if(document.getElementById('user').value === 'User123') {
                sessionStorage.setItem('tcUser', 'User123');
                window.location.href = 'location.html';
            } else {
                alert("Invalid Credentials. Use User123.");
            }
        }
    </script>
</body>
</html>
