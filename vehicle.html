<!DOCTYPE html>
<html lang="en">
<head>
    <title>TC App - Vehicle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="mdl-layout mdl-layout--fixed-header">
        <header class="mdl-layout__header">
            <div class="mdl-layout__header-row">
                <span class="mdl-layout-title">TC App</span>
                <div class="mdl-layout-spacer"></div>
                <a href="index.html" style="color: white; text-decoration: none; font-size: 12px;">Logout</a>
            </div>
        </header>
        <main class="mdl-layout__content">
            <div class="page-content">
                <h3 id="loc-display">Location</h3>
                <div class="card">
                    <form onsubmit="proceed(event)">
                        <label style="color: gray; font-size: 12px;">Vehicle</label>
                        <select id="vehicle-select" class="tc-input" required>
                            <option value="" disabled selected>Select vehicle...</option>
                        </select>

                        <label style="color: gray; font-size: 12px;">Contract type</label>
                        <select class="tc-input" required><option value="Fleet">Fleet</option></select>
                        
                        <div style="text-align: right; margin-top: 15px;">
                            <button type="submit" class="mdl-button mdl-js-button mdl-button--fab tc-btn-blue">
                                <i class="material-icons">arrow_forward</i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script>
        // Map the correct vehicle to the location the user just chose
        const vehicleMap = {
            "CentralHub_L_PUNML1": ["MH46BB7741"],
            "CentralHub_L_AMD": ["MH04JU6906"],
            "CentralHub_L_DEL8": ["MH05AW1234"],
            "CentralHub_L_KAL1": ["DL01CD4567"],
            "CentralHub_FPT": ["HR55AW6652"]
        };

        window.onload = () => {
            const loc = sessionStorage.getItem('tcLocation') || "CentralHub_L_PUNML1";
            document.getElementById('loc-display').innerText = loc;
            
            const dropdown = document.getElementById('vehicle-select');
            const vehicles = vehicleMap[loc] || ["MH46BB7741"];
            vehicles.forEach(v => {
                dropdown.innerHTML += `<option value="${v}">${v}</option>`;
            });
        };

        function proceed(e) {
            e.preventDefault();
            sessionStorage.setItem('tcVehicle', document.getElementById('vehicle-select').value);
            window.location.href = 'summary.html';
        }
    </script>
</body>
</html>
