<!DOCTYPE html>
<html lang="en">
<head>
    <title>TC App - Vehicle</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header">
        <div>☰ TC App</div>
        <div><a href="#" onclick="handleLogout()">Logout</a></div>
    </div>
    <div class="container">
        <div class="card">
            <h2>Vehicle Search</h2>
            <input type="text" placeholder="Enter Vehicle No (e.g. HR55AW6652)" required>
            
            <select required>
                <option value="Fleet">Fleet</option>
                <option value="Air">Air</option>
                <option value="Co-loader">Co-loader</option>
            </select>

            <div style="margin: 15px 0;">
                <label><input type="radio" name="task" value="loading"> Loading</label>
                <label><input type="radio" name="task" value="unloading" checked> Unloading</label>
            </div>

            <button class="btn btn-blue" onclick="window.location.href='dashboard.html'">PROCEED</button>
        </div>
    </div>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
