<!DOCTYPE html>
<html lang="en">
<head>
    <title>TC App - Location</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="mdl-layout mdl-layout--fixed-header">
        <header class="mdl-layout__header">
            <div class="mdl-layout__header-row">
                <span class="mdl-layout-title">TC App</span>
                <div class="mdl-layout-spacer"></div>
                <a href="index.html" style="color: white; text-decoration: none; font-size: 12px;">Logout</a>
            </div>
        </header>
        <main class="mdl-layout__content">
            <div class="page-content">
                <h3>Select Location</h3>
                <hr>
                <div class="card" style="padding: 0;">
                    <div class="list-item" onclick="selectLoc('CentralHub_L_PUNML1')">CentralHub_L_PUNML1</div>
                    <div class="list-item" onclick="selectLoc('CentralHub_L_AMD')">CentralHub_L_AMD</div>
                    <div class="list-item" onclick="selectLoc('CentralHub_L_DEL8')">CentralHub_L_DEL8</div>
                    <div class="list-item" onclick="selectLoc('CentralHub_L_KAL1')">CentralHub_L_KAL1</div>
                    <div class="list-item" onclick="selectLoc('CentralHub_FPT')">CentralHub_FPT</div>
                </div>
            </div>
        </main>
    </div>
    <script>
        function selectLoc(loc) {
            sessionStorage.setItem('tcLocation', loc);
            window.location.href = 'vehicle.html';
        }
    </script>
</body>
</html>
