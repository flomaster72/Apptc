<!DOCTYPE html>
<html lang="en">
<head>
    <title>TC App - Unloading Summary</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .progress-bg { background-color: #e0e0e0; height: 8px; border-radius: 4px; width: 100%; margin-top: 5px;}
        .progress-fill { background-color: #4caf50; height: 100%; width: 0%; transition: width 0.3s; }
        .scan-container { display: flex; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="mdl-layout mdl-layout--fixed-header">
        <header class="mdl-layout__header">
            <div class="mdl-layout__header-row">
                <span class="mdl-layout-title">TC App</span>
                <div class="mdl-layout-spacer"></div>
                <a href="index.html" style="color: white; text-decoration: none; font-size: 12px;">Logout</a>
            </div>
        </header>
        <main class="mdl-layout__content">
            <div class="page-content">
                <div class="breadcrumbs" id="bc-text">Loading...</div>

                <div class="card">
                    <div style="display: flex; justify-content: space-between; font-weight: bold;">
                        <span>Progress</span><span id="progress-text">0 / 0</span>
                    </div>
                    <div class="progress-bg"><div class="progress-fill" id="progress-bar"></div></div>

                    <form class="scan-container" onsubmit="handleScan(event)">
                        <input type="text" id="scanId" class="tc-input" style="margin:0;" placeholder="Start Scanning!" autocomplete="off" required>
                        <button type="submit" class="mdl-button mdl-button--raised tc-btn-pink">Scan</button>
                    </form>
                    <div id="error-msg" style="color: red; font-size: 12px; margin-top: 5px; display: none;"></div>
                </div>

                <table class="data-table card">
                    <thead><tr><th>From</th><th>Count</th></tr></thead>
                    <tbody id="summary-table"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        // --- PASTE YOUR SUPABASE KEYS HERE ---
        const supabaseUrl = 'https://ikcabwusytuyrxfchach.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlrY2Fid3VzeXR1eXJ4ZmNoYWNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwOTE3MTIsImV4cCI6MjA5NDY2NzcxMn0.oi5dLT1oMCZEG7SyMNASO3hubO8GXJ6KIH5oZtv5xCE'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const currentLoc = sessionStorage.getItem('tcLocation') || "Location";
        const currentVehicle = sessionStorage.getItem('tcVehicle') || "Vehicle";
        let vehicleShipments = []; 
        let totalItems = 0;
        let scannedItems = JSON.parse(sessionStorage.getItem(`tc_scans_${currentVehicle}`)) || [];

        window.onload = async () => {
            document.getElementById('bc-text').innerHTML = `${currentLoc} <i class="material-icons">chevron_right</i> ${currentVehicle} <i class="material-icons">chevron_right</i> FLEET`;
            
            const { data } = await supabase.from('shipments').select('*').eq('vehicle', currentVehicle);
            if (data) {
                vehicleShipments = data;
                totalItems = vehicleShipments.length;
                updateUI();
            }
            document.getElementById('scanId').focus();
        };

        function handleScan(event) {
            event.preventDefault();
            const input = document.getElementById('scanId');
            const barcode = input.value.trim();
            const errorMsg = document.getElementById('error-msg');

            const isValid = vehicleShipments.some(s => s.tracking_id === barcode);
            const isScanned = scannedItems.includes(barcode);

            if (isValid && !isScanned) {
                scannedItems.push(barcode);
                sessionStorage.setItem(`tc_scans_${currentVehicle}`, JSON.stringify(scannedItems)); 
                errorMsg.style.display = 'none';
                updateUI();
            } else {
                errorMsg.style.display = 'block';
                errorMsg.innerText = isScanned ? "Already Scanned!" : "Invalid Tracking ID!";
            }
            input.value = '';
            input.focus();
        }

        function updateUI() {
            document.getElementById('progress-text').innerText = `${scannedItems.length} / ${totalItems}`;
            if (totalItems > 0) document.getElementById('progress-bar').style.width = `${(scannedItems.length / totalItems) * 100}%`;
            
            document.getElementById('summary-table').innerHTML = `
                <tr>
                    <td><a href="detail.html">${currentLoc}</a></td>
                    <td>${scannedItems.length}/${totalItems}</td>
                </tr>
            `;
        }
    </script>
</body>
</html>
